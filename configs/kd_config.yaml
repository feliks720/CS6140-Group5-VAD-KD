# configs/kd_config.yaml
# Knowledge Distillation hyperparameters for VAD

# ======================== Data ========================
data:
  data_dir: "data/LibriParty/dataset"
  soft_labels_dir: "data/soft_labels"
  n_mels: 40
  sample_rate: 16000
  max_duration_s: 30.0

# ======================== Teacher ========================
teacher:
  source: "speechbrain/vad-crdnn-libriparty"
  # Teacher F1 on LibriParty test: ~0.9477

# ======================== Student ========================
# Choose one: tiny_cnn, mlp, tiny_transformer
student:
  name: "tiny_cnn"

  # TinyCNN params
  tiny_cnn:
    n_mels: 40
    hidden_channels: 32
    dropout: 0.1

  # MLPVAD params
  mlp:
    n_mels: 40
    context: 5
    hidden_dim: 128
    num_layers: 3
    dropout: 0.1

  # TinyTransformer params
  tiny_transformer:
    n_mels: 40
    d_model: 64
    nhead: 2
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.1

# ======================== KD ========================
kd:
  alpha: 0.7          # Weight for KD loss vs BCE loss
  temperature: 4.0    # Softmax temperature

  # Temperature sweep values for experiments
  temperature_sweep: [1, 2, 4, 8]

  # Alpha sweep values
  alpha_sweep: [0.3, 0.5, 0.7, 0.9]

# ======================== Training ========================
training:
  epochs: 30
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  scheduler: "cosine"  # cosine or step
  num_workers: 4

# ======================== Evaluation ========================
evaluation:
  threshold: 0.5
  # Post-processing
  merge_close_th: 0.250   # seconds
  min_segment_th: 0.250   # seconds
